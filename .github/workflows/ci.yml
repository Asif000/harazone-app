name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege permissions
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    # 30 min budget — KMP builds with Kotlin/Native can be slow on cold cache
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # JDK 21 required by AGP 8.11.2 + Gradle 8.14.3
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Handles Gradle wrapper download, dependency cache, and build cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Kotlin/Native compiler cache — only useful on macOS where iOS targets compile.
      # On ubuntu-latest, iOS targets are skipped so .konan stays minimal.
      - name: Cache Kotlin Native
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-

      - name: Build Android Debug APK
        run: ./gradlew :composeApp:assembleDebug

      # Note: allTests includes iosSimulatorArm64Test, but iOS targets are silently
      # skipped on Linux (Kotlin/Native requires macOS for Apple targets). Only Android
      # unit tests run here. A dedicated macOS job for iOS tests is deferred for cost.
      - name: Run All Tests
        run: ./gradlew :composeApp:allTests

      - name: Run Lint
        run: ./gradlew :composeApp:lint
